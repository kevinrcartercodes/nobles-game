<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobles</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(ellipse 140% 100% at 50% 45%, transparent 0%, rgba(0,0,0,0.45) 100%),
      linear-gradient(98deg, #3d2817 0%, #5a3a22 35%, #6b4730 50%, #5a3a22 65%, #3d2817 100%);
    font-family: 'Cinzel', serif;
    color: #d4c19a;
    text-align: center;
  }
  h1 {
    font-size: clamp(32px, 8vw, 64px);
    font-weight: 900;
    letter-spacing: 0.15em;
    margin: 0 0 0.3em;
    color: #f4e8d0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  p {
    font-size: clamp(13px, 2.5vw, 16px);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
    margin: 0;
  }
</style>
</head>
<body>
  <div>
    <h1>Nobles</h1>
    <p>Returning soon</p>
  </div>
</body>
</html>
